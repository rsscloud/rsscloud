# rssCloud server + test harness — example stack for Dockge (https://github.com/louislam/dockge)
#
# Usage:
#   1. In Dockge, create a new stack (e.g. "rsscloud") and paste this file.
#   2. Edit DOMAIN and HUB_URL below to your public hostname.
#   3. Deploy. Subscriptions + stats persist in the named volume `rsscloud-data`.
#
# Both services pull published images from the GitHub Container Registry
# rather than building, so this stack deploys without a checkout of the repo.
# To pin a release, replace `:latest` with a version tag (e.g.
# ghcr.io/rsscloud/server:4.0.0).
#
# The `debug` service is the rssCloud/WebSub test harness (apps/debug).
# Point a browser at it to test the paired hub, or edit its
# HUB_SERVER_URL/DEBUG_FETCH_ALLOW_CIDRS to test a different one. Remove the
# `debug` service entirely if you only want the hub.

services:
  rsscloud:
    image: ghcr.io/rsscloud/server:latest
    container_name: rsscloud-server
    restart: unless-stopped
    networks:
      - rsscloud-net
    ports:
      # host:container — change the host side if 5337 is taken; usually you'd
      # also front this with a reverse proxy terminating HTTPS.
      - "5337:5337"
    environment:
      # Externally-reachable hostname for this hub (no scheme, no port).
      DOMAIN: cloud.example.com
      # Public WebSub hub URL advertised to subscribers — point it at your
      # HTTPS endpoint. Must match how subscribers reach the /websub route.
      HUB_URL: https://cloud.example.com/websub
      # Optional: change the listen port (then update the ports mapping above).
      # PORT: "5337"
      #
      # SSRF egress protection is ON by default (recommended) and refuses
      # outbound requests to private/loopback addresses. Only relax it if your
      # feeds or subscribers genuinely live on a private LAN:
      #   WEBSUB_FETCH_ALLOW_CIDRS: "10.0.0.0/8,192.168.0.0/16"     # topic fetch
      #   WEBSUB_CALLBACK_ALLOW_CIDRS: "10.0.0.0/8,192.168.0.0/16"  # delivery
    volumes:
      # Persist on-disk state across restarts/redeploys.
      - rsscloud-data:/app/apps/server/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:5337/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  debug:
    image: ghcr.io/rsscloud/debug:latest
    container_name: rsscloud-debug
    restart: unless-stopped
    networks:
      - rsscloud-net
    depends_on:
      - rsscloud
    ports:
      - "9000:9000"
    environment:
      # Externally-reachable hostname/port this harness advertises for its
      # own callbacks and test feeds.
      DOMAIN: cloud.example.com
      # PORT: "9000"
      # Reach the sibling `rsscloud` service by its Compose service name —
      # override at runtime (the UI's server/hub override field) to test a
      # different hub instead.
      HUB_SERVER_URL: http://rsscloud:5337
      # SSRF egress protection is ON by default (recommended) and refuses
      # outbound requests to private addresses — including the Docker
      # network's own subnet, which is how `rsscloud` above is reached.
      # Scoped to exactly this stack's dedicated subnet (defined below), not
      # Docker's whole default bridge range, so pasting an arbitrary feed URL
      # into Discover can't reach anything else on the host's private network.
      DEBUG_FETCH_ALLOW_CIDRS: "172.28.5.0/24"

networks:
  # A dedicated, fixed subnet (rather than Docker's auto-assigned default
  # bridge range) so DEBUG_FETCH_ALLOW_CIDRS above can be scoped tightly to
  # just this stack instead of every private address Docker might use.
  rsscloud-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.5.0/24

volumes:
  rsscloud-data:
